<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ҰБТ Симуляторы | Суретпен</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-font-smoothing: antialiased; background-color: #f3f4f6; }
        .q-nav-container::-webkit-scrollbar { height: 4px; }
        .q-nav-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .q-dot {
            min-width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; border-radius: 8px; cursor: pointer; border: 1px solid #e5e7eb; transition: 0.2s;
        }
        .q-dot-active { background: #2563eb; color: white; border-color: #1d4ed8; }
        .q-dot-answered { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .q-dot-empty { background: white; color: #94a3b8; }
        
        /* Суреттің стильдері */
        .question-image {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #e2e8f0;
            background-color: white;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-card" class="max-w-4xl w-full bg-white rounded-2xl shadow-lg border border-slate-200 hidden overflow-hidden">
        <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
            <div id="timer" class="text-lg font-mono font-bold text-slate-700">02:00:00</div>
            <div class="text-right">
                <span id="progress-text" class="text-[11px] font-bold text-slate-400 uppercase">Сұрақ...</span>
                <div class="h-1.5 w-32 bg-slate-200 rounded-full mt-1 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-600 transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="q-navigation" class="q-nav-container flex gap-2 overflow-x-auto p-4 bg-white border-b border-slate-100"></div>

        <div class="p-6 md:p-10">
            <div id="q-type-label" class="mb-4 text-[10px] font-bold py-1 px-3 bg-blue-100 text-blue-700 rounded-full inline-block uppercase">Бір жауапты</div>
            
            <div id="image-container" class="hidden">
                <img id="q-image" src="" alt="Question illustration" class="question-image">
            </div>

            <h2 id="question" class="text-xl md:text-2xl font-bold text-slate-800 mb-8"></h2>
            
            <div id="answers" class="grid grid-cols-1 gap-3 mb-10"></div>

            <div class="flex justify-between items-center pt-6 border-t">
                <button onclick="changeQuestion(-1)" id="prevBtn" class="text-sm font-bold text-slate-400 hover:text-blue-600">← Артқа</button>
                <div class="flex gap-4">
                    <button onclick="showStats()" class="px-6 py-3 text-sm font-bold text-rose-500 hover:bg-rose-50 rounded-xl transition">Аяқтау</button>
                    <button onclick="changeQuestion(1)" id="nextBtn" class="px-10 py-3 bg-[#1e293b] text-white rounded-xl font-bold hover:bg-slate-800 shadow-lg transition">Алға →</button>
                </div>
            </div>
        </div>
    </div>

    <div id="stats-card" class="hidden max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-10 text-center">
        <h2 class="text-2xl font-bold text-slate-800 uppercase italic">Тест аяқталды</h2>
        <div id="final-score" class="text-7xl font-bold text-blue-600 my-8">0 / 50</div>
        <div id="review-section" class="text-left max-h-[400px] overflow-y-auto pr-2 mb-8 border-y py-4"></div>
        <button onclick="location.href='index.html'" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">Басты бетке қайту</button>
    </div>

    <script>
        let current = 0, quizData = [], userChoices = [], timeLeft = 120 * 60;

        async function loadQuiz() {
            try {
                const res = await fetch("questions.json");
                quizData = await res.json();
                userChoices = quizData.map(() => []);
                document.getElementById("game-card").classList.remove("hidden");
                startTimer();
                showQuestion();
            } catch (err) { console.error("Жүктеу қатесі:", err); }
        }

        function startTimer() {
            const timerEl = document.getElementById("timer");
            const interval = setInterval(() => {
                const h = Math.floor(timeLeft / 3600), m = Math.floor((timeLeft % 3600) / 60), s = timeLeft % 60;
                timerEl.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { clearInterval(interval); showStats(); }
                timeLeft--;
            }, 1000);
        }

        function renderNavigation() {
            const nav = document.getElementById("q-navigation");
            nav.innerHTML = "";
            quizData.forEach((_, i) => {
                const dot = document.createElement("div");
                dot.innerText = i + 1;
                let status = (i === current) ? "q-dot-active" : (userChoices[i].length > 0 ? "q-dot-answered" : "q-dot-empty");
                dot.className = `q-dot ${status}`;
                dot.onclick = () => { current = i; showQuestion(); };
                nav.appendChild(dot);
            });
        }

        function showQuestion() {
            const q = quizData[current];
            const isMultiple = (current >= 30);
            
            // СУРЕТТІ КӨРСЕТУ/ЖАСЫРУ ЛОГИКАСЫ
            const imgContainer = document.getElementById("image-container");
            const qImg = document.getElementById("q-image");
            if (q.image && q.image.trim() !== "") {
                qImg.src = q.image;
                imgContainer.classList.remove("hidden");
            } else {
                imgContainer.classList.add("hidden");
            }

            document.getElementById("q-type-label").innerText = isMultiple ? "Көп жауапты (2 балл)" : "Бір жауапты (1 балл)";
            document.getElementById("question").innerText = q.question;
            document.getElementById("progress-text").innerText = `Сұрақ ${current + 1} / ${quizData.length}`;
            document.getElementById("progress-bar").style.width = `${((current + 1) / quizData.length) * 100}%`;
            
            renderNavigation();
            const ansContainer = document.getElementById("answers");
            ansContainer.innerHTML = "";

            q.options.forEach(opt => {
                const isSelected = userChoices[current].includes(opt);
                const btn = document.createElement("button");
                btn.className = `w-full text-left p-4 rounded-xl border-2 transition-all flex items-center justify-between ${isSelected ? 'border-blue-500 bg-blue-50 text-blue-700 font-semibold' : 'border-slate-100 bg-white text-slate-600 hover:border-slate-200'}`;
                btn.innerHTML = `<span>${opt}</span> <div class="w-5 h-5 border-2 rounded ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-slate-200'}"></div>`;
                
                btn.onclick = () => {
                    if (!isMultiple) {
                        userChoices[current] = [opt];
                    } else {
                        const idx = userChoices[current].indexOf(opt);
                        if (idx > -1) userChoices[current].splice(idx, 1);
                        else if (userChoices[current].length < 3) userChoices[current].push(opt);
                    }
                    showQuestion();
                };
                ansContainer.appendChild(btn);
            });
        }

        function changeQuestion(step) {
            current += step;
            if (current >= 0 && current < quizData.length) showQuestion();
        }

        function calculateScore() {
            let total = 0;
            quizData.forEach((q, i) => {
                const isMultiple = (i >= 30);
                const cArr = Array.isArray(q.answer) ? q.answer : [q.answer];
                const uArr = userChoices[i];
                const errs = uArr.filter(a => !cArr.includes(a)).length + cArr.filter(a => !uArr.includes(a)).length;

                if (!isMultiple) {
                    if (errs === 0 && uArr.length > 0) total += 1;
                } else {
                    if (errs === 0 && uArr.length > 0) total += 2;
                    else if (errs === 1) total += 1;
                }
            });
            return total;
        }

        function showStats() {
            document.getElementById("game-card").classList.add("hidden");
            document.getElementById("stats-card").classList.remove("hidden");
            document.getElementById("final-score").innerText = `${calculateScore()} / 50`;
            
            const review = document.getElementById("review-section");
            review.innerHTML = "";
            quizData.forEach((q, i) => {
                const div = document.createElement("div");
                div.className = "p-3 mb-2 bg-slate-50 rounded-lg text-sm border border-slate-100";
                div.innerHTML = `<b>№${i+1}:</b> ${q.question} <br> <small class="text-blue-600">Дұрыс: ${Array.isArray(q.answer) ? q.answer.join(', ') : q.answer}</small>`;
                review.appendChild(div);
            });
        }

        loadQuiz();
    </script>
</body>
</html>
