<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Тест өту</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; color: #1a1a1a; }
        .nav-dot { min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid #f1f5f9; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; transition: 0.2s; }
        .nav-active { background: #1a1a1a; color: white; border-color: #1a1a1a; transform: translateY(-2px); }
        .ans-card { width: 100%; text-align: left; padding: 18px; border: 1px solid #f1f5f9; border-radius: 14px; margin-bottom: 10px; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .ans-active { border-color: #1a1a1a; background: #fbfbfb; font-weight: 800; }
        .rev-card { padding: 20px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #f1f5f9; text-align: left; }
        .correct { border-left: 5px solid #22c55e; background: #f0fdf4; }
        .wrong { border-left: 5px solid #ef4444; background: #fef2f2; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-card" class="max-w-2xl w-full border border-gray-100 p-8 rounded-[2rem] shadow-sm">
        <div class="flex justify-between items-center mb-6 pb-4 border-b">
            <span id="progress" class="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">ЖҮКТЕЛУДЕ...</span>
            <button onclick="finish()" class="text-[10px] text-red-500 font-black uppercase italic tracking-widest hover:opacity-70">Аяқтау</button>
        </div>

        <div id="nav-bar" class="flex gap-2 overflow-x-auto mb-8 py-2 no-scrollbar"></div>

        <h2 id="q-text" class="text-xl font-bold mb-10 leading-snug"></h2>
        <div id="ans-list" class="mb-10"></div>

        <div class="flex justify-between border-t pt-8">
            <button onclick="move(-1)" id="prevBtn" class="text-gray-400 font-black text-[10px] uppercase tracking-widest hover:text-black">← Артқа</button>
            <button onclick="move(1)" class="px-10 py-4 bg-black text-white rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-gray-800 transition-all">Келесі →</button>
        </div>
    </div>

    <div id="res-card" class="hidden max-w-2xl w-full text-center border p-12 rounded-[3rem]">
        <p class="text-gray-400 font-black text-[10px] mb-6 uppercase tracking-[0.3em]">Тест нәтижесі</p>
        <h1 id="score" class="text-8xl font-thin mb-12 text-blue-600">0 / 0</h1>
        
        <div id="review-list" class="max-h-96 overflow-y-auto mb-10 space-y-4 pr-2 text-sm"></div>
        
        <button onclick="location.href='index.html'" class="w-full py-5 bg-black text-white rounded-2xl font-bold uppercase tracking-widest text-xs">Басты бетке қайту</button>
    </div>

    <script>
        let current = 0, quiz = [], userAns = [];

        async function init() {
            const data = localStorage.getItem('currentQuiz');
            if (!data) {
                alert("Деректер табылмады! Басты бетке қайтыңыз.");
                location.href = 'index.html';
                return;
            }
            quiz = JSON.parse(data);
            userAns = quiz.map(() => []);
            render();
        }

        function render() {
            const q = quiz[current];
            document.getElementById("q-text").innerText = q.question;
            document.getElementById("progress").innerText = `СҰРАҚ ${current + 1} / ${quiz.length}`;
            document.getElementById("prevBtn").style.visibility = current === 0 ? "hidden" : "visible";

            const nav = document.getElementById("nav-bar");
            nav.innerHTML = "";
            quiz.forEach((_, i) => {
                const d = document.createElement("div");
                let state = (i === current) ? 'nav-active' : (userAns[i].length > 0 ? 'bg-gray-100 text-gray-500' : '');
                d.className = `nav-dot ${state}`;
                d.innerText = i + 1;
                d.onclick = () => { current = i; render(); };
                nav.appendChild(d);
            });

            const list = document.getElementById("ans-list");
            list.innerHTML = "";
            q.options.forEach(o => {
                const sel = userAns[current].includes(o);
                const b = document.createElement("button");
                b.className = `ans-card ${sel ? 'ans-active' : ''}`;
                b.innerHTML = `<span>${o}</span> <div class="w-5 h-5 border-2 rounded-md ${sel ? 'bg-black border-black' : 'border-gray-200'}"></div>`;
                b.onclick = () => {
                    const mult = Array.isArray(q.answer) && q.answer.length > 1;
                    if(!mult) userAns[current] = [o];
                    else {
                        const idx = userAns[current].indexOf(o);
                        if(idx > -1) userAns[current].splice(idx, 1);
                        else if(userAns[current].length < 3) userAns[current].push(o);
                    }
                    render();
                };
                list.appendChild(b);
            });
        }

        function move(s) {
            if(current + s >= 0 && current + s < quiz.length) { current += s; render(); }
            else if(current + s >= quiz.length) finish();
        }

        function finish() {
            let s = 0, m = 0;
            const rev = document.getElementById("review-list");
            rev.innerHTML = "";

            quiz.forEach((q, i) => {
                const cor = Array.isArray(q.answer) ? q.answer : [q.answer];
                const usr = userAns[i];
                const ok = JSON.stringify(cor.sort()) === JSON.stringify(usr.sort());
                
                if(cor.length > 1) { m += 2; if(ok) s += 2; }
                else { m += 1; if(ok) s += 1; }

                const div = document.createElement("div");
                div.className = `rev-card ${ok ? 'correct' : 'wrong'}`;
                div.innerHTML = `<p class="font-bold mb-2">${i+1}. ${q.question}</p>
                                 <p class="opacity-50 italic">Сенің жауабың: ${usr.join(", ") || "Жауап жоқ"}</p>
                                 <p class="font-bold text-blue-600">Дұрыс жауап: ${cor.join(", ")}</p>`;
                rev.appendChild(div);
            });

            document.getElementById("game-card").classList.add("hidden");
            document.getElementById("res-card").classList.remove("hidden");
            document.getElementById("score").innerText = `${s} / ${m}`;
        }
        init();
    </script>
</body>
</html>
