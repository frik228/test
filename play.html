<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Web Тест</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .answer-btn { 
            width: 100%; text-align: left; padding: 1.25rem; border-radius: 1rem; 
            border: 2px solid #f1f5f9; background: white; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        /* Басылған кездегі түс (сенің ескі дизайның) */
        .answer-btn.selected { 
            border-color: #2563eb; background-color: #eff6ff; color: #1e40af; font-weight: 700;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="game-card" class="max-w-2xl w-full bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
        <div class="flex justify-between items-center mb-8">
            <span id="progress-text" class="text-xs font-black text-slate-400 uppercase tracking-widest">Жүктелуде...</span>
        </div>
        
        <h2 id="question" class="text-xl font-bold text-slate-800 mb-10 leading-snug"></h2>
        
        <div id="answers" class="space-y-3 mb-12"></div>

        <div class="flex justify-between items-center pt-8 border-t border-slate-50">
            <button onclick="changeQuestion(-1)" id="prevBtn" class="text-slate-400 font-bold hover:text-blue-600 transition-colors">← АРТҚА</button>
            <button onclick="changeQuestion(1)" class="px-10 py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800">КЕЛЕСІ →</button>
        </div>
    </div>

    <script>
        let current = 0, quizData = [], userChoices = [];

        async function loadQuiz() {
            try {
                const res = await fetch("questions.json"); 
                quizData = await res.json();
                userChoices = quizData.map(() => []);
                showQuestion();
            } catch (err) { alert("questions.json табылмады!"); }
        }

        function showQuestion() {
            const q = quizData[current];
            document.getElementById("question").innerText = q.question;
            document.getElementById("progress-text").innerText = `Сұрақ ${current + 1} / ${quizData.length}`;
            
            const ansContainer = document.getElementById("answers");
            ansContainer.innerHTML = "";

            q.options.forEach(opt => {
                const isSelected = userChoices[current].includes(opt);
                const btn = document.createElement("button");
                // Кнопканың классын қосамыз
                btn.className = `answer-btn ${isSelected ? 'selected' : ''}`;
                btn.innerHTML = `<span>${opt}</span> <div class="w-6 h-6 border-2 rounded-lg ${isSelected ? 'bg-blue-600 border-blue-600' : 'border-slate-200'}"></div>`;
                
                // БАСУ ФУНКЦИЯСЫ (ҚАЗІР ІСТЕЙДІ)
                btn.onclick = () => {
                    const isMultiple = Array.isArray(q.answer);
                    if (!isMultiple) {
                        userChoices[current] = [opt]; // Бір жауап
                    } else {
                        const idx = userChoices[current].indexOf(opt);
                        if (idx > -1) userChoices[current].splice(idx, 1);
                        else userChoices[current].push(opt); // Көп жауап
                    }
                    showQuestion(); // Экранды жаңарту
                };
                ansContainer.appendChild(btn);
            });
        }

        function changeQuestion(step) {
            if (current + step >= 0 && current + step < quizData.length) {
                current += step;
                showQuestion();
            }
        }

        loadQuiz();
    </script>
</body>
</html>
