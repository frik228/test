<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Тест (Старый)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .quiz-text { word-wrap: break-word; line-height: 1.6; }
        .review-card-correct { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; padding: 1rem; border-radius: 12px; margin-bottom: 0.75rem; }
        .review-card-wrong { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 1rem; border-radius: 12px; margin-bottom: 0.75rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-card" class="max-w-xl w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-8 hidden">
        <div class="flex justify-between items-center mb-6">
            <span id="progress-text" class="text-sm font-bold text-slate-500 uppercase">Жүктелуде...</span>
            <button onclick="showStats()" class="text-sm font-bold text-rose-500 hover:text-rose-700 uppercase">Аяқтау</button>
        </div>
        
        <h2 id="question" class="text-xl md:text-2xl font-semibold text-slate-800 mb-8 quiz-text leading-tight"></h2>
        
        <div id="answers" class="grid grid-cols-1 gap-3.5 mb-10"></div>

        <div class="flex justify-between items-center border-t border-slate-50 pt-6">
            <button onclick="changeQuestion(-1)" id="prevBtn" class="px-4 py-2 text-sm text-slate-400 hover:text-sky-600 transition-all">← Артқа</button>
            <button onclick="changeQuestion(1)" id="nextBtn" class="px-6 py-2 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-all active:scale-95">Келесі →</button>
        </div>
    </div>

    <div id="stats-card" class="hidden max-w-xl w-full bg-white rounded-2xl shadow-xl p-10 text-center border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 uppercase italic tracking-tighter">Тест нәтижесі</h2>
        <div id="final-score" class="text-[120px] font-thin text-blue-600 leading-none my-10">0 / 0</div>
        <div id="record-box" class="mb-10 p-6 bg-slate-50 rounded-2xl border border-slate-100 italic text-slate-500 text-sm"></div>
        <div id="review-section" class="text-left max-h-[350px] overflow-y-auto pr-3 mb-10 py-6 border-y border-slate-50"></div>
        <button onclick="location.href='index.html'" class="w-full py-5 bg-slate-900 text-white rounded-xl font-bold">БАСТЫ БЕТКЕ ҚАЙТУ</button>
    </div>

    <script>
        let current = 0, quizData = [], userChoices = [];

        async function loadQuiz() {
            try {
                // questions.json файлын тікелей оқу (relative path)
                const res = await fetch("questions.json"); 
                if (!res.ok) {
                    alert("Қате: questions.json табылмады!");
                    window.location.href = 'index.html';
                    return;
                }
                quizData = await res.json();
                userChoices = quizData.map(() => []);
                document.getElementById("game-card").classList.remove("hidden");
                showQuestion();
            } catch (err) { console.error("Жүктеу қатесі:", err); alert("questions.json дұрыс емес!"); }
        }

        function renderNavigation() { /* Навигация нүктелері старый дизайнда жоқ */ }

        function showQuestion() {
            const q = quizData[current];
            const isMultiple = Array.isArray(q.answer) ? q.answer.length > 1 : false; // Көпжауапты файл ішіндегі жауаптарға байланысты
            
            document.getElementById("question").innerText = q.question;
            document.getElementById("progress-text").innerText = `Сұрақ ${current + 1} / ${quizData.length}`;
            document.getElementById("prevBtn").style.visibility = (current === 0) ? 'hidden' : 'visible';

            const ansContainer = document.getElementById("answers");
            ansContainer.innerHTML = "";

            q.options.forEach(opt => {
                const isSelected = userChoices[current].includes(opt);
                const btn = document.createElement("button");
                btn.className = `w-full text-left p-4 rounded-xl border-2 transition-all flex items-center justify-between ${isSelected ? 'border-sky-500 bg-sky-50 text-sky-700 font-semibold' : 'border-slate-100 bg-white text-slate-600 hover:border-slate-200'}`;
                btn.innerHTML = `<span>${opt}</span><div class="w-6 h-6 border-2 rounded ${isSelected ? 'bg-sky-500 border-sky-500' : 'border-slate-200'}"></div>`;
                
                btn.onclick = () => {
                    if (!isMultiple) {
                        userChoices[current] = [opt]; // Бір жауап
                    } else {
                        const idx = userChoices[current].indexOf(opt);
                        if (idx > -1) userChoices[current].splice(idx, 1);
                        else if (userChoices[current].length < 3) userChoices[current].push(opt); // Макс 3 таңдау
                    }
                    showQuestion();
                };
                ansContainer.appendChild(btn);
            });
        }

        function changeQuestion(step) { current += step; showQuestion(); }

        function calculateScore() {
            let total = 0;
            quizData.forEach((q, i) => {
                const cArr = Array.isArray(q.answer) ? q.answer : [q.answer];
                const uArr = userChoices[i];
                const errs = uArr.filter(a => !cArr.includes(a)).length + cArr.filter(a => !uArr.includes(a)).length;

                if (Array.isArray(q.answer) && q.answer.length > 1) { // Көпжауапты
                    if (errs === 0 && uArr.length > 0) total += 2;
                    else if (errs === 1) total += 1;
                } else { // Біржауапты
                    if (errs === 0 && uArr.length > 0) total += 1;
                }
            });
            return total;
        }

        function showStats() {
            const score = calculateScore();
            document.getElementById("game-card").classList.add("hidden");
            document.getElementById("stats-card").classList.remove("hidden");
            document.getElementById("final-score").innerText = `${score}`;
            document.getElementById("record-box").innerText = `Тест аяқталды! Үздік нәтиже үшін тарихқа өтіңіз.`;
        }

        loadQuiz();
    </script>
</body>
</html>
