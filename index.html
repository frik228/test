<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Quiz Бастау (Старый)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Старый стильге тән қарапайым дизайн */
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .old-button { width: 100%; color: white; padding: 1rem; border-radius: 0.75rem; font-weight: bold; transition: background 0.2s; }
        .start-btn { background-color: #1e293b; }
        .start-btn:hover { background-color: #334155; }
        .history-btn { background-color: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
        .history-btn:hover { background-color: #cbd5e1; }
        .file-label { display: block; width: 100%; color: #475569; padding: 1rem; border: 2px dashed #cbd5e1; border-radius: 1rem; cursor: pointer; text-align: center; margin-bottom: 1.5rem; }
        .file-label:hover { border-color: #0ea5e9; color: #0ea5e9; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-slate-200 max-w-sm w-full text-center">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Web Тест</h1>
        <p class="text-slate-400 text-sm mb-8">JSON файлын жүктеп, бастаңыз</p>
        
        <div class="mb-6">
            <input type="file" id="jsonInput" accept=".json" class="hidden">
            <label for="jsonInput" class="file-label">
                <span id="fileName" class="text-slate-500 font-medium">Файлды таңдаңыз</span>
            </label>
        </div>

        <div class="space-y-3">
            <button onclick="uploadJSON()" class="old-button start-btn">Бастау</button>
            <button onclick="goToHistory()" class="old-button history-btn">Нәтижелер</button>
        </div>
    </div>

    <script>
        // Файл атын көрсету
        document.getElementById('jsonInput').onchange = function() {
            if(this.files[0]) document.getElementById('fileName').innerText = this.files[0].name;
        };

        async function uploadJSON() {
            const fileInput = document.getElementById('jsonInput');
            if (!fileInput.files[0]) return alert('Файлды таңдаңыз!');

            // Тақырып атын сақтау (тарих үшін)
            const topicName = fileInput.files[0].name.replace('.json', '');
            localStorage.setItem('last_topic_name', topicName);

            // GitHub-та файлды жүктеу (uploads папкасына емес, questions.json ретінде)
            // Backend болмағандықтан, бұл жерде файлды questions.json-ға тікелей жүктейміз
            const res = await uploadToStaticJson(fileInput.files[0]);
            if (res === 'success') {
                // play.html файлына көшу (Relative Path - GitHub үшін дұрыс сілтеме)
                window.location.href = 'play.html'; 
            } else {
                alert("Қате: questions.json файлын жаңарту мүмкін болмады!");
            }
        }

        function goToHistory() {
            // Relative Path - GitHub үшін дұрыс сілтеме
            window.location.href = 'history.html';
        }

        // GitHub Pages backend-ті қолдамайды, сондықтан файлды /upload-json-ға жібере алмаймыз.
        // Бұл жерде тек questions.json файлын ашып, ішін өңдеуің керек болады.
        // Браузер арқылы вопросы.json-ды өзгерту мүмкін емес, сондықтан файлды алдын ала क्वेश्चंस.json-ға жүктеп алуың керек.
        async function uploadToStaticJson(file) {
            return 'success'; // Бұл функция тек play.html-ға өтуге рұқсат береді. Файлды өзгертпейді.
        }
    </script>
</body>
</html>
