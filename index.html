<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Quiz Бастау</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; color: #1a1a1a; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.2s; border: 1px solid #1a1a1a; }
        .btn-black { background: #1a1a1a; color: white; }
        .btn-white { background: white; color: #1a1a1a; margin-top: 10px; }
        .btn:hover { opacity: 0.8; }
        .file-box { border: 2px dashed #ccc; padding: 20px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xs w-full text-center">
        <h1 class="text-2xl font-bold mb-6">ТЕСТ СИМУЛЯТОРЫ</h1>
        
        <div class="file-box" onclick="document.getElementById('jsonInput').click()">
            <input type="file" id="jsonInput" accept=".json" class="hidden" onchange="updateFileName()">
            <p id="fileName" class="text-sm text-gray-500">JSON файлын таңдаңыз</p>
        </div>

        <button onclick="startQuiz()" class="btn btn-black">БАСТАУ</button>
        <button onclick="window.location.href='history.html'" class="btn btn-white">ТАРЫХ</button>
    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById('jsonInput');
            if(input.files[0]) document.getElementById('fileName').innerText = input.files[0].name;
        }

        function startQuiz() {
            const fileInput = document.getElementById('jsonInput');
            if (!fileInput.files[0]) return alert('Алдымен файлды жүктеңіз!');
            // GitHub Pages-те файлды серверге сақтау мүмкін емес, 
            // сондықтан क्वेश्चंस.json файлы репозиторийде алдын-ала болуы керек.
            window.location.href = 'play.html';
        }
    </script>
</body>
</html>
